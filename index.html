<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Princesa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Para minha princesa...</h1>
        <p>A contagem regressiva para estarmos juntos novamente:</p>
        
        <div id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <span>Dias</span>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <span>Horas</span>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <span>Minutos</span>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <span>Segundos</span>
            </div>
        </div>
        
        <p class="message">Estou contando cada segundo! ❤️</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
